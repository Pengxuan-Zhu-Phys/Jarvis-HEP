Scan:
  name: "EggBox_PTEnsemble_Operas_Quick"
  save_dir: "&J/Results"
  sample_directory:
    limit: 200
    width: 6
    archive_samples: true

Sampling:
  Method: "PTEnsemble"
  Variables:
    - name: x
      description: "Variable X following a Flat distribution for sampling."
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0
    - name: y
      description: "Variable Y following a Flat distribution for sampling."
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0
  Bounds:
    num_chains: 8
    num_iters: 300
    exchange_interval: 10
    proposal_scales: [0.08, 0.08, 0.08, 0.08, 0.08, 0.08, 0.08, 0.08]
    temperature_ladder: [1.0, 1.4, 2.0, 2.8, 3.9, 5.5, 7.8, 11.0]
    stretch_a: 2.0
  LogLikelihood:
    - {name: "LogL_Z", expression: "LogGauss(z, 100, 10)"}

EnvReqs:
  OS:
    - name: linux
      version: ">=3.10.0"
    - name: Darwin
      version: ">=10.14"
  Check_default_dependences:
    required: true
    default_yaml_path: "&SRC/card/environment_default.yaml"

Operas:
  make_paraller: 8
  Modules:
    - name: EggBox
      operator: "helper.eggbox2d"
      call_mode: call
      required_modules: []
      input:
        - {name: x, expression: "x"}
        - {name: y, expression: "y"}
      output:
        - {name: z, entry: z}
