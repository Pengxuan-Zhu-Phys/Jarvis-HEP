Scan:
  name: "EggBox_MultiNest_Operas_Quick"
  save_dir: "&J/Results"

Sampling:
  Method: "MultiNest"
  Variables:
    - name: xx
      description: "Variable X following a Flat distribution for sampling."
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0

    - name: yy
      description: "Variable Y following a Flat distribution for sampling."
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0
  Bounds:
    nlive: 48
    rseed: 21
    run_nested:
      maxcall: 120
      print_progress: False

  LogLikelihood:
    - {name: "LogL_Z", expression: "LogGauss(z, 100, 10)"}

EnvReqs:
  OS:
    - name: linux
      version: ">=3.10.0"
    - name: Darwin
      version: ">=10.14"
  Check_default_dependences:
    required: true
    default_yaml_path: "&SRC/card/environment_default.yaml"

Operas:
  make_paraller: 4
  Modules:
    - name: EggBox
      operator: "helper.eggbox2d"
      call_mode: call
      required_modules: []
      input:
        - {name: x, expression: "xx * Pi"}
        - {name: y, expression: "yy * Pi"}
      output:
        - {name: z, entry: z}
