Scan: 
  name: "EggBox_DNN"
  save_dir: "../../Results"

Sampling:
  Method: "DNN" 
  Variables:
    - name: xx
      description: "Variable X following a Flat distribution for sampling."
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0

    - name: yy
      description: "Variable Y following a Logarithmic distribution for sampling."
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0
  
  Bounds: 
    Niters: 100
    Hidden_layers: [32, 64, 128, 16]
    Batch_size: 10
    Ninit:  200
    Nepoch: 500
    Learning_rate:  0.0001
    Outputs:  
      - z
      
  LogLikelihood: 
    - {name: "LogL_Z",  expression: "LogGauss(z, 100, 10)"}

EnvReqs:
  OS: 
    - name: linux 
      version: ">=3.10.0"
    - name: Darwin
      version: ">=10.0"
  Check_default_dependences:
    required: True 
    default_yaml_path:  "&SRC/card/environment_default.yaml"

Operas:
  make_paraller: 16
  Modules:
    - name: EggBox
      operator: "helper.eggbox2d"
      call_mode: call
      required_modules: []
      input:
        - {name: x, expression: "xx * Pi"}
        - {name: y, expression: "yy * Pi"}
      output:
        - {name: z, entry: z}

