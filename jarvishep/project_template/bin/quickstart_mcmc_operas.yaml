Scan:
  name: "quickstart_mcmc_operas"
  save_dir: "&J/outputs"
  sample_directory:
    limit: 200
    width: 6
    archive_samples: true

Sampling:
  Method: "MCMC"
  Variables:
    - name: x
      description: "Toy variable x"
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0
    - name: y
      description: "Toy variable y"
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 5.0
  Bounds:
    num_chains: 8
    num_iters: 600
    proposal_scale: 0.06
  LogLikelihood:
    - {name: "LogL_Z", expression: "LogGauss(z, 100, 10)"}

EnvReqs:
  OS:
    - name: linux
      version: ">=3.10.0"
    - name: Darwin
      version: ">=10.14"
  Check_default_dependencies:
    required: true
    default_yaml_path: "&J/deps/environment_default.yaml"

Operas:
  make_paraller: 8
  Modules:
    - name: EggBox
      operator: "helper.eggbox2d"
      call_mode: call
      required_modules: []
      input:
        - {name: x, expression: "x"}
        - {name: y, expression: "y"}
      output:
        - {name: z, entry: z}
