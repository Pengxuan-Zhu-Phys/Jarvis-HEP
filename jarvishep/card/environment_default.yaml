EnvReqs:
  CERN_ROOT:
    required: true
    version: ">=6.20"
    get_path_command: "root-config --prefix"
    Dependencies:
    - name: minuit2
      required: false
      check_command: "root-config --has-minuit2"
      expected_output: "yes"

