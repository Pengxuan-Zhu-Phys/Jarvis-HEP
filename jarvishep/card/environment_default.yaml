      required: true
      version: ">=4.0"
    - name: loguru
      required: true
      version: ">=0.7.0"
    - name: jarvis-operas
      required: true
      version: ">=1.3.2"
    - name: matplotlib
      required: true
      version: ">=3.3"
    - name: mpmath
      required: true
      version: ">=1.3.0"
    - name: networkx
      required: true
      version: ">=3.2.1"
    - name: numpy
      required: true
      version: ">=1.18.0"
    - name: pandas
      required: true
      version: ">=2.1.0"
    - name: pillow
      required: true
      version: ">=10.0.0"
