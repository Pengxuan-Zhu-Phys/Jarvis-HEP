project_name: parity-grid
Scan:
  name: grid-opera
Runtime:
  mode: redis
  workers: 2
  batch_size: 3
  sample_artifacts: auto
  Watchdog:
    enabled: false
Sampling:
  Method: Grid
  Seed: 0
  Variables:
    - name: x
      distribution:
        type: Flat
        parameters:
          min: 0.0
          max: 1.0
          num: 3
    - name: y
      distribution:
        type: Flat
        parameters:
          min: 0.0
          max: 1.0
          num: 3
  LogLikelihood:
    - name: LogL_Z
      expression: z
Operas:
  Modules:
    - name: TrivialEggbox
      operator: jarvishep2.testing.eggbox.eggbox2d_numpy
      call_mode: call
      input:
        - name: x
          expression: x
        - name: y
          expression: y
      output:
        - name: z
          entry: z