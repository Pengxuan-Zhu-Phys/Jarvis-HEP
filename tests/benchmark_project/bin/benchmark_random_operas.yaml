Scan:
  name: "benchmark_random_operas"
  save_dir: "&J/outputs"
  sample_directory:
    limit: 1000000
    width: 6
    archive_samples: false

Sampling:
  Method: "Random"
  Point number: 100000000
  Variables:
    - name: x
      description: "x"
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 1
    - name: y
      description: "y"
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 1
    - name: shift
      description: "shift"
      distribution:
        type: Flat
        parameters:
          min: 0
          max: 1
  LogLikelihood:
    - name: "LogL_Z"
      expression: "z"

EnvReqs:
  OS:
    - name: Darwin
      version: ">=10.14"
    - name: linux
      version: ">=3.10"
  Python:
    version: ">=3.10"
    Dependencies: []

Calculators:
  make_paraller: 1
  Modules: []

Operas:
  make_paraller: 16
  Modules:
    - name: TrivialEggbox
      operator: "helper.eggbox2d"
      call_mode: call
      required_modules: []
      input:
        - {name: x, expression: "x + shift * 0"}
        - {name: y, expression: "y"}
      output:
        - {name: z, entry: z}
